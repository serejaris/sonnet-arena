<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sonnet-arena</title>
    <style>
      html, body {
        margin: 0;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(10, 10, 16, 0.7);
        color: #f0f0f0;
        font: 600 1.5rem/1.4 system-ui, sans-serif;
        text-align: center;
        cursor: pointer;
        user-select: none;
      }
      #overlay.hidden {
        display: none;
      }
      #overlay p {
        margin: 0;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
      }
      #overlay .hint {
        margin-top: 0.5rem;
        font-size: 1rem;
        font-weight: 400;
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <div>
        <p>click to play</p>
        <p class="hint">WASD to move &middot; mouse to look &middot; space to jump &middot; esc to release</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
