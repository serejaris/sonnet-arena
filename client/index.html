<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sonnet-arena</title>
    <style>
      html, body {
        margin: 0;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(10, 10, 16, 0.7);
        color: #f0f0f0;
        font: 600 1.5rem/1.4 system-ui, sans-serif;
        text-align: center;
        cursor: pointer;
        user-select: none;
      }
      #overlay.hidden {
        display: none;
      }
      #overlay p {
        margin: 0;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
      }
      #overlay .hint {
        margin-top: 0.5rem;
        font-size: 1rem;
        font-weight: 400;
        opacity: 0.75;
      }

      /* M3 HUD: crosshair, hp readout, hit-marker flash, kill feed,
         death/respawn overlay. All plain CSS/DOM, no assets. */
      #crosshair {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 6px;
        margin: -3px 0 0 -3px;
        border-radius: 50%;
        background: rgba(240, 240, 240, 0.85);
        box-shadow: 0 0 2px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        display: none;
        z-index: 10;
      }
      #crosshair.visible {
        display: block;
      }

      #hit-marker {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font: 700 1.6rem/1 system-ui, sans-serif;
        color: #ff5050;
        text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.1s ease;
        z-index: 11;
      }
      #hit-marker.show {
        opacity: 1;
      }

      #hp-display {
        position: fixed;
        left: 16px;
        bottom: 16px;
        font: 700 1.1rem/1.2 system-ui, sans-serif;
        color: #f0f0f0;
        background: rgba(10, 10, 16, 0.55);
        padding: 6px 12px;
        border-radius: 4px;
        pointer-events: none;
        z-index: 5;
      }

      #kill-feed {
        position: fixed;
        right: 16px;
        top: 16px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        align-items: flex-end;
        pointer-events: none;
        z-index: 5;
      }
      .kill-feed-entry {
        font: 600 0.9rem/1.3 system-ui, sans-serif;
        color: #f0f0f0;
        background: rgba(10, 10, 16, 0.55);
        padding: 4px 10px;
        border-radius: 4px;
        opacity: 1;
        transition: opacity 0.6s ease;
      }
      .kill-feed-entry.fade {
        opacity: 0;
      }

      #death-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(40, 6, 6, 0.55);
        color: #f0f0f0;
        font: 600 1.5rem/1.4 system-ui, sans-serif;
        text-align: center;
        /* purely visual — respawn is triggered by the same document-level
           mousedown handler that fires shots, see weapon.ts, since clicks
           while pointer-locked target the canvas, not overlapping DOM. */
        pointer-events: none;
        z-index: 8;
      }
      #death-overlay.hidden {
        display: none;
      }
      #death-overlay .hint {
        margin-top: 0.5rem;
        font-size: 1rem;
        font-weight: 400;
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <div>
        <p>click to play</p>
        <p class="hint">WASD to move &middot; mouse to look &middot; space to jump &middot; esc to release</p>
      </div>
    </div>
    <div id="crosshair"></div>
    <div id="hp-display">HP 100</div>
    <div id="hit-marker">&times;</div>
    <div id="kill-feed"></div>
    <div id="death-overlay" class="hidden">
      <div>
        <p>you died</p>
        <p class="hint">click to respawn</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
